services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tanso}
      POSTGRES_USER: ${POSTGRES_USER:-tanso}
      # "changeme" is a non-functional placeholder — set POSTGRES_PASSWORD in your .env before deploying
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tanso}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-tanso}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-tanso}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      # Required — container fails to start if unset/empty (no insecure repo-published default)
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ../apps/dashboard
      dockerfile: Dockerfile
      # VITE_* vars are inlined at build time, so they must be passed as build args,
      # not runtime environment (the container only serves the already-built bundle).
      args:
        VITE_TANSO_BACKEND_URL: ${VITE_TANSO_BACKEND_URL:-http://localhost:8080}
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  pgdata:
