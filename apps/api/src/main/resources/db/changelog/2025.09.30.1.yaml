databaseChangeLog:
  - changeSet:
      id: "20250930-1"
      author: doug
      changes:
        - addColumn:
            tableName: subscriptions
            columns:
              - column:
                  name: grace_period_days
                  type: int
                  defaultValueNumeric: "3"
