databaseChangeLog:
  - changeSet:
      id: "20251002-2"
      author: doug
      changes:
        - addColumn:
            tableName: features
            columns:
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: features
            columnNames: "account_id, key, is_deleted"
            constraintName: uq_features_account_key_active