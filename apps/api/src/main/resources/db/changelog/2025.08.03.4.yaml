databaseChangeLog:
  - changeSet:
      id: 20250803-3
      author: doug
      changes:
        - createTable:
            tableName: stripe_products_plans
            columns:
              - column:
                  name: stripe_products_plans_id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: stripe_product_id
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: plan_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_stripe_products_plans_plan
                    references: plans(plan_id)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: modified_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
