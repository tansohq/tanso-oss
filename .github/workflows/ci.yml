name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17.5
        env:
          POSTGRES_DB: core_db
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      # The repo ships the mvnw script but not .mvn/wrapper, so use the
      # runner's Maven. The CI database starts empty, so let Liquibase
      # apply the schema for integration tests (application-test.yaml
      # disables it for local runs against an already-migrated dev DB).
      - name: Build and test
        run: mvn -B clean verify
        env:
          SPRING_LIQUIBASE_ENABLED: "true"

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Run the gitleaks binary directly — the gitleaks-action requires a
      # paid license key for organization repos.
      - name: Run Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar xz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --verbose
