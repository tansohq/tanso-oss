databaseChangeLog:
  - changeSet:
      id: 20250927-1
      author: doug
      changes:
        - createTable:
            tableName: invoices
            columns:
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: modified_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: invoice_id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: subscription_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_invoices_subscriptions
                    references: subscriptions(subscription_id)
              - column:
                  name: amount
                  type: numeric(18,2)
                  constraints:
                    nullable: false
              - column:
                  name: due_date
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: CHAR(3)
                  constraints:
                    nullable: false
