databaseChangeLog:
  - changeSet:
      id: 20250806-1
      author: doug
      changes:
        - createTable:
            tableName: external_api_keys
            columns:
              - column:
                  name: external_api_key_id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: account_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_account_api_keys_account
                    references: accounts(account_id)
              - column:
                  name: external_api_entity_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: key_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: key_value
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: boolean
                  defaultValueBoolean: true
              - column:
                  name: expires_at
                  type: timestamp
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: modified_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - sql:
            dbms: postgresql
            sql: |
              CREATE TRIGGER external_api_keys_account_id_immutable
              BEFORE UPDATE ON external_api_keys
              FOR EACH ROW
              EXECUTE FUNCTION prevent_account_id_update();
