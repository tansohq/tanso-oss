databaseChangeLog:
  - changeSet:
      id: 20260325-1
      author: tanso
      changes:
        - createTable:
            tableName: model_pricing
            columns:
              - column:
                  name: model
                  type: VARCHAR(128)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: provider
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: input_cost_per_million
                  type: NUMERIC(18, 6)
                  constraints:
                    nullable: false
              - column:
                  name: output_cost_per_million
                  type: NUMERIC(18, 6)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
