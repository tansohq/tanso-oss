# prevents account_id from being updated in users / customers / plans
# users_accounts tables
databaseChangeLog:
  - changeSet:
      id: 20250714-3
      author: doug
      changes:
        - sql:
            dbms: postgresql
            sql: |
              CREATE TRIGGER customers_account_id_immutable
              BEFORE UPDATE ON customers
              FOR EACH ROW
              EXECUTE FUNCTION prevent_account_id_update();

              CREATE TRIGGER plans_account_id_immutable
              BEFORE UPDATE ON plans
              FOR EACH ROW
              EXECUTE FUNCTION prevent_account_id_update();
              
              CREATE TRIGGER users_accounts_account_id_immutable
              BEFORE UPDATE ON users_accounts
              FOR EACH ROW
              EXECUTE FUNCTION prevent_account_id_update();