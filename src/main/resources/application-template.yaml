server:
  port: 8080

app:
  stripe-webhook-endpoint: ${APP_WEBHOOK_ENDPOINT:https://localhost:8080/public/stripe/ingest/webhook}

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-seconds: 7200   # 2 hours
    issuer: tanso-core

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/core_db
    username: dev_user
    password: dev_pass
    driver-class-name: org.postgresql.Driver
  main:
    allow-bean-definition-overriding: true

  docker:
    compose:
      # noinspection SpringBootApplicationYaml
      enabled: false

  devtools:
    livereload:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: none  # Disable Hibernate schema auto-generation
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        jdbc:
          time_zone: UTC

  liquibase:
    enabled: true
    change-log: db/changelog/tanso-db-changelog-master.yaml
    contexts: dev
    default-schema: public
    drop-first: false  # true = wipe DB on startup (only for resets/dev)

  jackson:
    time-zone: UTC

logging:

  file:
    path: ./logs-generated
  level:
    liquibase: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE  # Optional: shows query params
    org.springframework.web: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

springdoc:
  api-docs:
    enabled: true

jobs:
  invoicePending:
    cron: 0 0 1 * * *
  invoiceDue:
    cron: 0 0 4 * * *
  invoiceCancelled:
    cron: 0 0 5 * * *
  subscriptionCancellation:
    cron: 0 0 2 * * *
  subscriptionCycle:
    cron: 0 0 6 * * *
  backgroundJobsWithFixedDelay:
    reconciliationDelay: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info            # keep it tight
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true                   # enables /health/liveness & /health/readiness
      show-details: never               # don’t leak details in prod
